<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Focus Mode Active - Cognify</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: #050505;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow: hidden;
            color: #ffffff;
            position: relative;
        }

        /* Abstract Background Elements */
        .bg-glow {
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(0,245,160,0.15) 0%, rgba(0,0,0,0) 70%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 0;
            pointer-events: none;
            animation: pulse-slow 8s ease-in-out infinite alternate;
        }
        
        .bg-glow-2 {
            position: absolute;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(0,245,160,0.1) 0%, rgba(0,0,0,0) 70%);
            bottom: -100px;
            right: -100px;
            z-index: 0;
            pointer-events: none;
        }

        @keyframes pulse-slow {
            0% { transform: translate(-50%, -50%) scale(0.8); opacity: 0.5; }
            100% { transform: translate(-50%, -50%) scale(1.2); opacity: 1; }
        }

        .container {
            background: rgba(15, 15, 15, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border-radius: 32px;
            padding: 60px 40px;
            max-width: 600px;
            width: 100%;
            text-align: center;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6), inset 0 1px 0 rgba(255, 255, 255, 0.1);
            animation: slideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
            transform: translateY(40px);
            position: relative;
            z-index: 10;
        }

        @keyframes slideUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .icon-container {
            position: relative;
            width: 100px;
            height: 100px;
            margin: 0 auto 30px;
        }

        .icon {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #00F5A0;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 30px rgba(0, 245, 160, 0.4);
            z-index: 2;
        }
        
        .icon-ring {
            position: absolute;
            top: -10px;
            left: -10px;
            right: -10px;
            bottom: -10px;
            border: 2px solid rgba(0, 245, 160, 0.3);
            border-radius: 50%;
            animation: ripple 2s linear infinite;
            z-index: 1;
        }

        @keyframes ripple {
            0% { transform: scale(0.8); opacity: 1; }
            100% { transform: scale(1.5); opacity: 0; }
        }

        .icon svg {
            width: 44px;
            height: 44px;
            stroke: #050505;
            stroke-width: 2.5;
            fill: none;
        }

        h1 {
            font-size: 2.5rem;
            background: linear-gradient(135deg, #ffffff 0%, #a3a3a3 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 12px;
            font-weight: 700;
            letter-spacing: -1px;
        }

        .message {
            font-size: 1.15rem;
            color: #a3a3a3;
            margin-bottom: 40px;
            line-height: 1.6;
            font-weight: 300;
        }

        .blocked-site-container {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 16px 24px;
            border-radius: 100px;
            margin: 0 auto 40px;
            display: inline-flex;
            align-items: center;
            gap: 12px;
        }
        
        .blocked-site-container svg {
            width: 20px;
            height: 20px;
            stroke: #00F5A0;
            stroke-width: 2;
            fill: none;
        }

        .blocked-site {
            font-size: 1.1rem;
            color: #e0e0e0;
            font-weight: 500;
            font-family: monospace;
            letter-spacing: 0.5px;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 16px 40px;
            background: #00F5A0;
            color: #050505;
            text-decoration: none;
            border-radius: 100px;
            font-weight: 600;
            font-size: 1.1rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: none;
            cursor: pointer;
            box-shadow: 0 10px 25px rgba(0, 245, 160, 0.3);
        }

        .btn svg {
            width: 20px;
            height: 20px;
            stroke: currentColor;
            stroke-width: 2.5;
            fill: none;
            transition: transform 0.3s ease;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 35px rgba(0, 217, 245, 0.4);
            filter: brightness(1.1);
        }
        
        .btn:hover svg {
            transform: translateX(4px);
        }
    </style>
</head>

<body>
    <div class="bg-glow"></div>
    <div class="bg-glow-2"></div>
    
    <div class="container">
        <div class="icon-container">
            <div class="icon-ring"></div>
            <div class="icon">
                <svg viewBox="0 0 24 24">
                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                    <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                </svg>
            </div>
        </div>

        <h1>Focus Mode Active</h1>
        
        <p class="message">
            This website is currently restricted to help you maintain deep focus on your goals.
        </p>

        <div class="blocked-site-container">
            <svg viewBox="0 0 24 24">
                <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"></path>
                <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"></path>
            </svg>
            <span class="blocked-site" id="blockedSite">Loading...</span>
        </div>
        <br>

        <a href="https://cognify-theta.vercel.app" class="btn">
            Return to Dashboard
            <svg viewBox="0 0 24 24">
                <line x1="5" y1="12" x2="19" y2="12"></line>
                <polyline points="12 5 19 12 12 19"></polyline>
            </svg>
        </a>
    </div>

    <script>
        // Get blocked URL from query parameter
        const urlParams = new URLSearchParams(window.location.search);
        let blockedUrl = urlParams.get('url') || 'Restricted Site';
        
        // Clean up URL for display
        try {
            if (blockedUrl !== 'Restricted Site' && !blockedUrl.startsWith('http')) {
                blockedUrl = 'https://' + blockedUrl;
            }
            const urlObj = new URL(blockedUrl);
            document.getElementById('blockedSite').textContent = urlObj.hostname;
        } catch(e) {
            document.getElementById('blockedSite').textContent = blockedUrl;
        }
    </script>
</body>

</html>
